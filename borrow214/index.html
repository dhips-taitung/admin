<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東海國小資訊器材借用系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold text-blue-700 mb-6 text-center">東海國小資訊器材借用申請</h1>
        <p class="text-red-500 text-sm mb-4">* 僅限使用 @dhips.ttct.edu.tw 信箱申請</p>
        
        <form id="borrowForm" class="space-y-4">
            <!-- Email -->
            <div>
                <label class="block text-gray-700 font-bold mb-1">G-mail 信箱：</label>
                <input type="email" id="email" name="email" required placeholder="example@dhips.ttct.edu.tw"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- 借用日期 -->
                <div>
                    <label class="block text-gray-700 font-bold mb-1">借用日期：</label>
                    <input type="date" id="borrowDate" name="borrowDate" required
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <!-- 歸還日期 -->
                <div>
                    <label class="block text-gray-700 font-bold mb-1">預計歸還日：</label>
                    <input type="date" id="returnDate" name="returnDate" required
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <!-- 器材資訊 -->
            <div>
                <label class="block text-gray-700 font-bold mb-1">借用器材名稱：</label>
                <input type="text" id="equipment" name="equipment" required placeholder="例如：iPad、筆電"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-1">借用數量：</label>
                    <input type="number" id="quantity" name="quantity" min="1" required
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-1">器材編號：</label>
                    <input type="text" id="idNumber" name="idNumber" required placeholder="如：DH-001"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <!-- 借用原因 -->
            <div>
                <label class="block text-gray-700 font-bold mb-1">借用原因 (選填)：</label>
                <textarea id="reason" name="reason" rows="3"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <!-- 按鈕 -->
            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300">
                提交申請
            </button>
        </form>

        <div id="statusMessage" class="mt-4 p-4 rounded-lg hidden text-center font-semibold"></div>
    </div>

    <script>
        // 請將下方的 URL 替換成你部署後的 GAS 網頁應用程式網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzisQztHoZPWULdZrOa-NtwFflg0yj5JYFJm20LAa1pi1eQaosDY4lLdaB683m2rESKDw/exec";

        const form = document.getElementById('borrowForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 前端初步驗證信箱
            const email = document.getElementById('email').value;
            if (!email.endsWith('@dhips.ttct.edu.tw')) {
                showMsg("錯誤：請使用學校信箱 (@dhips.ttct.edu.tw) 填寫！", "red");
                return;
            }

            // 按鈕停用狀態
            btn.disabled = true;
            btn.textContent = "處理中...";
            showMsg("正在提交資料，請稍候...", "blue");

            const formData = {
                email: email,
                borrowDate: document.getElementById('borrowDate').value,
                returnDate: document.getElementById('returnDate').value,
                equipment: document.getElementById('equipment').value,
                quantity: document.getElementById('quantity').value,
                idNumber: document.getElementById('idNumber').value,
                reason: document.getElementById('reason').value
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();

                if (result.result === "success") {
                    showMsg(result.message, "green");
                    form.reset();
                } else {
                    showMsg(result.message, "red");
                }
            } catch (error) {
                showMsg("系統連線失敗，請檢查網路或 GAS 網址是否正確。", "red");
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.textContent = "提交申請";
            }
        });

        function showMsg(text, color) {
            msg.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700', 'bg-blue-100', 'text-blue-700');
            msg.innerText = text;
            if (color === "red") msg.classList.add('bg-red-100', 'text-red-700');
            if (color === "green") msg.classList.add('bg-green-100', 'text-green-700');
            if (color === "blue") msg.classList.add('bg-blue-100', 'text-blue-700');
            msg.classList.remove('hidden');
        }
    </script>
</body>
</html>
