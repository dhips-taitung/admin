<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東海國小資訊器材借用系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f5f5f5; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #eee; margin-right: 5px; border-radius: 5px 5px 0 0; }
        .tab.active { background: #3498db; color: white; font-weight: bold; }
        .content { display: none; }
        .content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #2980b9; }
        .admin-box { background: #fff3cd; padding: 20px; border: 1px solid #ffeeba; border-radius: 8px; margin-top: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f8f9fa; }
        .btn-status { width: auto; padding: 4px 8px; margin-right: 2px; font-size: 12px; }
        .overdue { color: red; font-weight: bold; }
        #loading { display:none; color: #3498db; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>東海國小資訊器材借用系統</h2>
    
    <div id="auth-section">
        <label>請輸入學校信箱驗證：</label>
        <input type="email" id="userEmail" placeholder="example@dhips.ttct.edu.tw">
        <button onclick="verifyEmail()">登入系統</button>
    </div>

    <div id="main-section" style="display:none;">
        <div class="tabs">
            <div id="t1" class="tab active" onclick="switchTab('borrow-page', 't1')">借用填表</div>
            <div id="t2" class="tab" onclick="switchTab('manage-page', 't2')">管理分頁</div>
        </div>

        <div id="loading">處理中...</div>

        <!-- 借用填表 -->
        <div id="borrow-page" class="content active">
            <form id="borrowForm">
                <div class="form-group">
                    <label>申請人：</label>
                    <input type="text" id="userNameDisp" disabled>
                </div>
                <div class="form-group">
                    <label>借用日期：</label>
                    <input type="date" id="bDate" required>
                </div>
                <div class="form-group">
                    <label>預計歸還日：</label>
                    <input type="date" id="rDate" required>
                </div>
                <div class="form-group">
                    <label>借用器材：</label>
                    <select id="equipSelect" onchange="syncId()" required></select>
                </div>
                <div class="form-group">
                    <label>器材編號：</label>
                    <input type="text" id="equipIdDisp" readonly>
                </div>
                <div class="form-group">
                    <label>借用數量：</label>
                    <input type="number" id="qty" value="1" min="1" required>
                </div>
                <div class="form-group">
                    <label>借用原因 (選填)：</label>
                    <textarea id="reason"></textarea>
                </div>
                <button type="submit">送出申請</button>
            </form>
        </div>

        <!-- 管理分頁 -->
        <div id="manage-page" class="content">
            <!-- 管理員登入 -->
            <div id="admin-login-box" class="admin-box">
                <h3>管理員登入</h3>
                <input type="password" id="adminPass" placeholder="請輸入管理驗證碼">
                <button onclick="adminLogin()">驗證並進入</button>
            </div>

            <!-- 管理列表 (預設隱藏) -->
            <div id="admin-list-box" style="display:none;">
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <strong>借用管理清單</strong>
                    <button onclick="adminLogout()" style="width:auto; padding:5px 10px; background:#e74c3c">登出管理</button>
                </div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>申請人</th><th>器材</th><th>預計歸還</th><th>情形</th><th>逾期</th><th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzisQztHoZPWULdZrOa-NtwFflg0yj5JYFJm20LAa1pi1eQaosDY4lLdaB683m2rESKDw/exec"; // 務必換成你的部署網址
    let userData = null;
    let equipData = [];
    let isAdmin = false;

    // 信箱驗證
    async function verifyEmail() {
        const email = document.getElementById('userEmail').value;
        showLoading(true);
        const res = await callGAS({ action: "checkUser", email: email });
        showLoading(false);
        if (res.success) {
            userData = res.data;
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-section').style.display = 'block';
            document.getElementById('userNameDisp').value = userData.name;
            loadEquips();
        } else {
            alert(res.msg);
        }
    }

    // 載入器材
    async function loadEquips() {
        const res = await callGAS({ action: "getInitialData" });
        if (res.success) {
            equipData = res.data;
            const sel = document.getElementById('equipSelect');
            sel.innerHTML = '<option value="">-- 請選擇 --</option>';
            equipData.forEach(e => sel.innerHTML += `<option value="${e.name}">${e.name}</option>`);
        }
    }

    function syncId() {
        const val = document.getElementById('equipSelect').value;
        const item = equipData.find(e => e.name === val);
        document.getElementById('equipIdDisp').value = item ? item.id : "";
    }

    // 提交申請
    document.getElementById('borrowForm').onsubmit = async (e) => {
        e.preventDefault();
        showLoading(true);
        const data = {
            userName: userData.name,
            borrowDate: document.getElementById('bDate').value,
            returnDate: document.getElementById('rDate').value,
            equipName: document.getElementById('equipSelect').value,
            equipId: document.getElementById('equipIdDisp').value,
            quantity: document.getElementById('qty').value,
            reason: document.getElementById('reason').value
        };
        const res = await callGAS({ action: "submitForm", data: data });
        showLoading(false);
        alert(res.msg);
        if (res.success) document.getElementById('borrowForm').reset();
    };

    // 管理員登入
    async function adminLogin() {
        const pass = document.getElementById('adminPass').value;
        showLoading(true);
        const res = await callGAS({ action: "verifyAdmin", code: pass });
        showLoading(false);
        if (res.success) {
            isAdmin = true;
            document.getElementById('admin-login-box').style.display = 'none';
            document.getElementById('admin-list-box').style.display = 'block';
            fetchRecords();
        } else {
            alert(res.msg);
        }
    }

    function adminLogout() {
        isAdmin = false;
        document.getElementById('admin-login-box').style.display = 'block';
        document.getElementById('admin-list-box').style.display = 'none';
        document.getElementById('adminPass').value = "";
    }

    // 獲取管理記錄
    async function fetchRecords() {
        if (!isAdmin) return;
        const res = await callGAS({ action: "getRecords" });
        const tbody = document.getElementById('recordBody');
        tbody.innerHTML = "";
        if (res.success) {
            res.data.reverse().forEach((row, idx) => {
                const realIdx = res.data.length - 1 - idx;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row[1]}</td>
                    <td>${row[4]}</td>
                    <td>${formatDate(row[3])}</td>
                    <td>${row[8] || '待處理'}</td>
                    <td class="overdue">${row[9] || ''}</td>
                    <td>
                        <button class="btn-status" onclick="updateStatus(${realIdx}, '已領')">已領</button>
                        <button class="btn-status" style="background:#27ae60" onclick="updateStatus(${realIdx}, '已歸還')">歸還</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    }

    async function updateStatus(rowIdx, status) {
        showLoading(true);
        const res = await callGAS({ action: "updateStatus", row: rowIdx, status: status });
        showLoading(false);
        if (res.success) fetchRecords();
    }

    // 切換分頁
    function switchTab(pId, tId) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        document.getElementById(tId).classList.add('active');
        if (pId === 'manage-page' && isAdmin) fetchRecords();
    }

    async function callGAS(payload) {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        return await res.json();
    }

    function showLoading(s) { document.getElementById('loading').style.display = s ? 'block' : 'none'; }

    function formatDate(dt) {
        if (!dt) return "";
        const d = new Date(dt);
        return `${d.getMonth()+1}/${d.getDate()}`;
    }
</script>

</body>
</html>
