<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東海國小器材借用系統</title>
    <style>
        :root { --main: #2c3e50; --blue: #3498db; --green: #27ae60; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab { padding: 12px 25px; cursor: pointer; border-radius: 5px 5px 0 0; }
        .tab.active { background: var(--blue); color: white; font-weight: bold; }
        .content { display: none; padding-top: 10px; }
        .content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .btn-sm { width: auto; padding: 5px 10px; font-size: 12px; margin-right: 5px; }
        #admin-auth-box { text-align: center; padding: 40px 0; }
        #admin-auth-box input { width: 200px; margin-bottom: 10px; }
        .overdue { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color: var(--main);">東海國小資訊器材借用系統</h2>

    <!-- 信箱驗證區 -->
    <div id="login-section">
        <label>請輸入學校 G-mail 驗證：</label>
        <input type="email" id="authEmail" placeholder="example@dhips.ttct.edu.tw">
        <button onclick="doLogin()" style="margin-top:10px">進入系統</button>
    </div>

    <!-- 主要功能區 -->
    <div id="main-section" style="display:none;">
        <div class="tabs">
            <div id="t1" class="tab active" onclick="switchTab('borrow-page', 't1')">借用填表</div>
            <div id="t2" class="tab" onclick="switchTab('manage-page', 't2')">管理分頁</div>
        </div>

        <!-- 借用填表分頁 -->
        <div id="borrow-page" class="content active">
            <form id="borrowForm">
                <div class="form-group"><label>填表人：</label><input type="text" id="userName" disabled></div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1"><label>借用日期：</label><input type="date" id="borrowDate" required></div>
                    <div class="form-group" style="flex:1"><label>預計歸還日：</label><input type="date" id="returnDate" required></div>
                </div>
                <div class="form-group"><label>借用器材：</label><select id="equipList" onchange="syncId()" required></select></div>
                <div class="form-group"><label>器材編號：</label><input type="text" id="equipId" disabled></div>
                <div class="form-group"><label>借用數量：</label><input type="number" id="qty" value="1" min="1" required></div>
                <div class="form-group"><label>借用原因 (選填)：</label><textarea id="reason"></textarea></div>
                <button type="submit" id="submitBtn">送出借用申請</button>
            </form>
        </div>

        <!-- 管理分頁 -->
        <div id="manage-page" class="content">
            <!-- 管理員登入 -->
            <div id="admin-auth-box">
                <h4>管理者驗證</h4>
                <input type="password" id="adminCode" placeholder="輸入驗證碼">
                <button onclick="verifyAdmin()" style="width:100px">登入</button>
            </div>
            <!-- 管理內容 -->
            <div id="admin-content" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>管理模式已啟用</span>
                    <button onclick="adminLogout()" style="width:80px; background:#e74c3c;">登出</button>
                </div>
                <div style="overflow-x:auto;">
                    <table id="recordTable">
                        <thead><tr><th>姓名</th><th>器材</th><th>預計歸還</th><th>情形</th><th>逾期</th><th>操作</th></tr></thead>
                        <tbody id="recordBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzisQztHoZPWULdZrOa-NtwFflg0yj5JYFJm20LAa1pi1eQaosDY4lLdaB683m2rESKDw/exec"; // <-- 請置換為您的 GAS Web App 網址
    let userData = null;
    let equips = [];

    // 使用者登入
    async function doLogin() {
        const email = document.getElementById('authEmail').value;
        const res = await api('checkUser', { email: email });
        if(res.success) {
            userData = res.data;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-section').style.display = 'block';
            document.getElementById('userName').value = userData.name;
            loadEquipData();
        } else { alert(res.msg); }
    }

    // 載入清單
    async function loadEquipData() {
        const res = await api('getInitialData');
        if(res.success) {
            equips = res.data;
            const select = document.getElementById('equipList');
            select.innerHTML = '<option value="">請選擇器材</option>';
            equips.forEach(e => select.innerHTML += `<option value="${e.name}">${e.name}</option>`);
        }
    }

    function syncId() {
        const item = equips.find(e => e.name === document.getElementById('equipList').value);
        document.getElementById('equipId').value = item ? item.id : "";
    }

    // 送出申請
    document.getElementById('borrowForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        const data = {
            userName: userData.name,
            borrowDate: document.getElementById('borrowDate').value,
            returnDate: document.getElementById('returnDate').value,
            equipName: document.getElementById('equipList').value,
            equipId: document.getElementById('equipId').value,
            quantity: document.getElementById('qty').value,
            reason: document.getElementById('reason').value
        };
        const res = await api('submitForm', { data: data });
        alert(res.msg);
        btn.disabled = false;
        if(res.success) document.getElementById('borrowForm').reset();
    };

    // 管理員驗證
    async function verifyAdmin() {
        const code = document.getElementById('adminCode').value;
        const res = await api('adminAuth', { code: code });
        if(res.success) {
            document.getElementById('admin-auth-box').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadRecords();
        } else { alert(res.msg); }
    }

    function adminLogout() {
        document.getElementById('admin-auth-box').style.display = 'block';
        document.getElementById('admin-content').style.display = 'none';
        document.getElementById('adminCode').value = "";
    }

    async function loadRecords() {
        const res = await api('getRecords');
        const tbody = document.getElementById('recordBody');
        tbody.innerHTML = "";
        if(res.success) {
            res.data.reverse().forEach((row, i) => {
                const idx = res.data.length - 1 - i;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row[1]}</td><td>${row[4]}</td><td>${formatDate(row[3])}</td>
                    <td>${row[8] || '<span style="color:#999">待審核</span>'}</td>
                    <td class="overdue">${row[9] || ''}</td>
                    <td>
                        <button class="btn-sm" onclick="setStatus(${idx}, '已領')">已領</button>
                        <button class="btn-sm" style="background:var(--green)" onclick="setStatus(${idx}, '已歸還')">歸還</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    }

    async function setStatus(idx, status) {
        const res = await api('updateStatus', { row: idx, status: status });
        if(res.success) loadRecords();
    }

    function switchTab(pageId, tabId) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    async function api(action, payload = {}) {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action, ...payload })
        });
        return await response.json();
    }

    function formatDate(dateStr) {
        if(!dateStr) return "";
        const d = new Date(dateStr);
        return `${d.getMonth()+1}/${d.getDate()}`;
    }
</script>

</body>
</html>
