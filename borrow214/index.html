<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>東海國小資訊器材借用系統</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; border: 1px solid transparent; }
        .tab.active { border: 1px solid #ddd; border-bottom: 2px solid white; margin-bottom: -2px; font-weight: bold; }
        .content { display: none; }
        .content.active { display: block; }
        label { display: block; margin: 10px 0 5px; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { margin-top: 15px; padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 14px; }
        .overdue { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>東海國小資訊器材借用系統</h2>
    
    <div id="auth-section">
        <label>請輸入學校 G-mail 驗證：</label>
        <input type="email" id="userEmail" placeholder="example@dhips.ttct.edu.tw">
        <button onclick="verifyEmail()">登入驗證</button>
    </div>

    <div id="main-section" style="display:none;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('borrow-tab')">借用填表</div>
            <div class="tab" onclick="switchTab('manage-tab'); loadRecords();">管理分頁</div>
        </div>

        <!-- 借用填表 -->
        <div id="borrow-tab" class="content active">
            <form id="borrowForm">
                <label>填表人：</label>
                <input type="text" id="displayUserName" disabled>
                
                <label>借用日期：</label>
                <input type="date" id="borrowDate" required>
                
                <label>預計歸還日：</label>
                <input type="date" id="returnDate" required>
                
                <label>借用器材：</label>
                <select id="equipSelect" onchange="updateEquipId()" required></select>
                
                <label>器材編號：</label>
                <input type="text" id="equipId" disabled>
                
                <label>借用數量：</label>
                <input type="number" id="quantity" value="1" min="1" required>
                
                <label>借用原因：</label>
                <textarea id="reason"></textarea>
                
                <button type="submit" id="submitBtn">送出申請</button>
            </form>
        </div>

        <!-- 管理分頁 -->
        <div id="manage-tab" class="content">
            <table id="recordTable">
                <thead>
                    <tr>
                        <th>時間</th><th>申請人</th><th>器材</th><th>歸還日</th><th>狀態</th><th>逾期</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="recordBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzisQztHoZPWULdZrOa-NtwFflg0yj5JYFJm20LAa1pi1eQaosDY4lLdaB683m2rESKDw/exec"; // <-- 請置換成你的 GAS 網頁應用程式網址
    let currentUser = {};
    let equipList = [];

    async function verifyEmail() {
        const email = document.getElementById('userEmail').value;
        const res = await apiCall({ action: "checkUser", email: email });
        
        if (res.success) {
            currentUser = res.data;
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-section').style.display = 'block';
            document.getElementById('displayUserName').value = currentUser.name;
            loadInitialData();
        } else {
            alert(res.msg);
        }
    }

    async function loadInitialData() {
        const res = await apiCall({ action: "getInitialData" });
        if (res.success) {
            equipList = res.data;
            const select = document.getElementById('equipSelect');
            select.innerHTML = '<option value="">請選擇器材</option>';
            equipList.forEach(item => {
                select.innerHTML += `<option value="${item.name}">${item.name}</option>`;
            });
        }
    }

    function updateEquipId() {
        const name = document.getElementById('equipSelect').value;
        const item = equipList.find(i => i.name === name);
        document.getElementById('equipId').value = item ? item.id : "";
    }

    document.getElementById('borrowForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        
        const data = {
            userName: currentUser.name,
            userEmail: currentUser.email,
            borrowDate: document.getElementById('borrowDate').value,
            returnDate: document.getElementById('returnDate').value,
            equipName: document.getElementById('equipSelect').value,
            equipId: document.getElementById('equipId').value,
            quantity: document.getElementById('quantity').value,
            reason: document.getElementById('reason').value
        };

        const res = await apiCall({ action: "submitForm", data: data });
        alert(res.msg);
        btn.disabled = false;
        if (res.success) document.getElementById('borrowForm').reset();
    };

    async function loadRecords() {
        const res = await apiCall({ action: "getRecords" });
        const tbody = document.getElementById('recordBody');
        tbody.innerHTML = "讀取中...";
        if (res.success) {
            tbody.innerHTML = "";
            res.data.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${new Date(row[0]).toLocaleDateString()}</td>
                    <td>${row[1]}</td>
                    <td>${row[4]}</td>
                    <td>${new Date(row[3]).toLocaleDateString()}</td>
                    <td>${row[8]}</td>
                    <td class="overdue">${row[9] || ''}</td>
                    <td>
                        <button onclick="updateStatus(${index}, '已領')">已領</button>
                        <button onclick="updateStatus(${index}, '已歸還')">已歸還</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    }

    async function updateStatus(index, status) {
        const res = await apiCall({ action: "updateStatus", row: index, status: status });
        if (res.success) {
            alert(status + " 更新成功");
            loadRecords();
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function apiCall(payload) {
        const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        });
        return await response.json();
    }
</script>

</body>
</html>
