<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東海國小資訊器材借用系統</title>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #27ae60; --r: #e74c3c; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .box { max-width: 900px; margin: auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab { padding: 12px 25px; cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--a); color: white; font-weight: bold; border-radius: 5px 5px 0 0; }
        .page { display: none; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        .g { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--a); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .btn-s { width: auto; padding: 6px 12px; font-size: 12px; margin-right: 5px; cursor: pointer; border-radius: 3px; border: none; color: #fff; }
        #auth-panel { text-align: center; padding: 40px 0; }
        .star { color: var(--r); font-weight: bold; font-size: 16px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center; color: var(--p);">東海國小資訊器材借用系統</h2>

    <!-- 信箱驗證 -->
    <div id="v-sec">
        <div class="g">
            <label>請輸入學校 G-mail 驗證 (@dhips.ttct.edu.tw)：</label>
            <input type="email" id="email" placeholder="example@dhips.ttct.edu.tw">
            <button onclick="login()" style="margin-top:10px">進入系統</button>
        </div>
    </div>

    <!-- 主介面 -->
    <div id="m-sec" style="display:none;">
        <div class="tabs">
            <div id="t1" class="tab active" onclick="tab('p1', 't1')">借用填表</div>
            <div id="t2" class="tab" onclick="tab('p2', 't2')">管理分頁</div>
        </div>

        <!-- 填表分頁 -->
        <div id="p1" class="page active">
            <form id="f1">
                <div class="g"><label>填表人：</label><input type="text" id="u-name" disabled></div>
                <div style="display:flex; gap:10px;">
                    <div class="g" style="flex:1"><label>借用日期：</label><input type="date" id="b-date" required></div>
                    <div class="g" style="flex:1"><label>預計歸還日：</label><input type="date" id="r-date" required></div>
                </div>
                <div class="g"><label>借用器材：</label><select id="e-list" onchange="sid()" required></select></div>
                <div class="g"><label>器材編號：</label><input type="text" id="e-id" disabled></div>
                <div class="g"><label>借用數量：</label><input type="number" id="qty" value="1" min="1" required></div>
                <div class="g"><label>借用原因 (選填)：</label><textarea id="res" rows="2"></textarea></div>
                <button type="submit" id="sub">送出借用申請</button>
            </form>
        </div>

        <!-- 管理分頁 -->
        <div id="p2" class="page">
            <div id="auth-panel">
                <h4>管理者登入驗證</h4>
                <input type="password" id="pcode" placeholder="請輸入管理密碼" style="width:200px">
                <button onclick="vAdmin()" style="width:80px; margin-left:10px">登入</button>
            </div>
            <div id="admin-panel" style="display:none;">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <b>管理清單</b>
                    <button onclick="logout()" style="width:80px; background:var(--r)">登出</button>
                </div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>姓名</th><th>器材</th><th>歸還日</th><th>情形</th><th>逾期</th><th>操作</th></tr></thead>
                        <tbody id="rtbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const G_URL = "https://script.google.com/macros/s/AKfycbzisQztHoZPWULdZrOa-NtwFflg0yj5JYFJm20LAa1pi1eQaosDY4lLdaB683m2rESKDw/exec"; // <-- 替換為部署後的網址
    let u_obj = null, e_data = [];

    async function api(a, p = {}) {
        const r = await fetch(G_URL, { method: 'POST', body: JSON.stringify({ action: a, ...p }) });
        return await r.json();
    }

    async function login() {
        const m = document.getElementById('email').value;
        const res = await api('checkUser', { email: m });
        if(res.success) {
            u_obj = res.data;
            document.getElementById('v-sec').style.display = 'none';
            document.getElementById('m-sec').style.display = 'block';
            document.getElementById('u-name').value = u_obj.name;
            const elist = await api('getInitialData');
            if(elist.success) {
                e_data = elist.data;
                const sel = document.getElementById('e-list');
                sel.innerHTML = '<option value="">請選擇器材</option>';
                e_data.forEach(x => sel.innerHTML += `<option value="${x.name}">${x.name}</option>`);
            }
        } else alert(res.msg);
    }

    function sid() {
        const item = e_data.find(x => x.name === document.getElementById('e-list').value);
        document.getElementById('e-id').value = item ? item.id : "";
    }

    document.getElementById('f1').onsubmit = async (e) => {
        e.preventDefault();
        const b = document.getElementById('sub');
        b.disabled = true;
        const d = {
            userName: u_obj.name,
            borrowDate: document.getElementById('b-date').value,
            returnDate: document.getElementById('r-date').value,
            equipName: document.getElementById('e-list').value,
            equipId: document.getElementById('e-id').value,
            quantity: document.getElementById('qty').value,
            reason: document.getElementById('res').value
        };
        const res = await api('submitForm', { data: d });
        alert(res.msg);
        b.disabled = false;
        if(res.success) document.getElementById('f1').reset();
    };

    async function vAdmin() {
        const c = document.getElementById('pcode').value;
        const res = await api('adminAuth', { code: c });
        if(res.success) {
            document.getElementById('auth-panel').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            loadR();
        } else alert(res.msg);
    }

    async function loadR() {
        const res = await api('getRecords');
        const tb = document.getElementById('rtbody');
        tb.innerHTML = "";
        if(res.success) {
            res.data.reverse().forEach((r, i) => {
                const idx = res.data.length - 1 - i;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r[1]}</td><td>${r[4]}</td><td>${fmtD(r[3])}</td>
                    <td>${r[8] || '<small style="color:#999">未領</small>'}</td>
                    <td class="star">${r[9]||''}</td>
                    <td>
                        <button class="btn-s" style="background:var(--a)" onclick="upd(${idx},'已領')">已領</button>
                        <button class="btn-s" style="background:var(--s)" onclick="upd(${idx},'已歸還')">歸還</button>
                    </td>`;
                tb.appendChild(tr);
            });
        }
    }

    async function upd(i, s) {
        const res = await api('updateStatus', { row: i, status: s });
        if(res.success) loadR();
    }

    function logout() {
        document.getElementById('auth-panel').style.display = 'block';
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('pcode').value = "";
    }

    function tab(p, t) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById(t).classList.add('active');
    }

    function fmtD(s) {
        if(!s) return "";
        const d = new Date(s);
        return `${d.getMonth()+1}/${d.getDate()}`;
    }
</script>

</body>
</html>
