<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>資料查詢系統</title>

<style>
  /* ============================
     全域設定
     ============================ */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
    background-color: #f0f2f5;
    color: #333;
    margin: 0;
    padding: 0;
    font-size: 16px;
    line-height: 1.5;
  }

  .container {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
  }

  h2 {
    text-align: center;
    color: #1a73e8;
    margin-bottom: 20px;
    font-size: 1.5rem;
  }

  /* ============================
     搜尋區塊
     ============================ */
  .search-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 25px;
    position: sticky;
    top: 10px;
    z-index: 10;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s;
    appearance: none;
  }
  input[type="text"]:focus { border-color: #1a73e8; }

  input[type="button"] {
    width: 100%;
    padding: 12px;
    background-color: #1a73e8;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
  }
  input[type="button"]:active { transform: scale(0.98); background-color: #1557b0; }
  input[type="button"]:disabled { background-color: #a0c3ff; cursor: wait; }

  @media (min-width: 480px) {
    .input-group { flex-direction: row; }
    input[type="button"] { width: auto; min-width: 100px; }
  }

  /* ============================
     結果卡片顯示 (靠左對齊版)
     ============================ */
  #order_status {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .student-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    overflow: hidden;
    animation: fadeIn 0.3s ease-in-out;
    border: 1px solid #eee;
  }

  .card-header {
    background: #1967d2; /* 深藍色底 */
    color: #fff;          /* 白色字 */
    padding: 12px 20px;
    font-weight: bold;
    font-size: 1.1em;
    border-bottom: 1px solid #dcdcdc;
  }

  .card-body {
    padding: 15px 20px;
  }

  /* 資料列 Flex 設定：靠左對齊 (flex-start) */
  .data-row {
    display: flex;
    justify-content: flex-start; /* 靠左對齊 */
    align-items: baseline;       /* 文字基線對齊 */
    padding: 8px 0;
    border-bottom: 1px dashed #eee; /* 改用虛線區隔 */
    flex-wrap: wrap; /* 允許換行 */
  }

  .data-row:last-child {
    border-bottom: none;
  }

  /* 標題樣式：明顯顏色區隔 (標籤感) */
  .data-label {
    background-color: #e8f0fe; /* 淺藍底 */
    color: #1967d2;            /* 深藍字 */
    font-weight: bold;
    font-size: 0.9em;
    padding: 4px 8px;          /* 內距 */
    border-radius: 4px;        /* 圓角 */
    margin-right: 12px;        /* 與內容的距離 */
    white-space: nowrap;       /* 不換行 */
    flex-shrink: 0;            /* 不被壓縮 */
  }

  /* 內容樣式 */
  .data-value {
    color: #202124;
    font-weight: 500;
    text-align: left; /* 靠左 */
    flex: 1;          /* 佔滿剩餘空間 */
    word-break: break-all;
    line-height: 1.6;
  }

  /* 極小螢幕調整 */
  @media (max-width: 350px) {
    .data-row { flex-direction: column; }
    .data-label { margin-bottom: 4px; width: fit-content; }
  }

  .no-data, .error {
    text-align: center;
    padding: 20px;
    background: white;
    border-radius: 8px;
    color: #666;
  }
  .error { color: #d93025; background: #fce8e6; }

  .spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #1a73e8;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
  }

  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

</style>

<script>

// =========================
// GAS 部署網址 (請填入)
// =========================
const GAS_URL = "https://script.google.com/macros/s/AKfycby50psP6jBwPYa06oItoeJTnCiSGP6V2qdNAB88Sw5AH-RlI0L5PnnHlephVQpCrxML0Q/exec";

// =========================
// 驗證碼處理
// =========================
function getAuthCode() {
  let code = sessionStorage.getItem("authCode");
  if (!code) {
    code = prompt("請輸入驗證碼：");
    if (!code) return null;
    sessionStorage.setItem("authCode", code);
  }
  return code;
}

// =========================
// 日期格式化
// =========================
function formatDate(value){
  if (!value) return "";
  value = String(value).trim();
  if (!value.includes("T") && !value.includes("-") && !value.includes("/")) return value; 
  if (value.includes("T")) return value.split("T")[0];
  
  const d = new Date(value);
  if(!isNaN(d) && value.length > 6){
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,'0');
    const day=String(d.getDate()).padStart(2,'0');
    return y+"-"+m+"-"+day;
  }
  return value;
}

// =========================
// 查詢主程式
// =========================
function doQuery(){

  const keyword = document.getElementById("uid").value.trim();
  const resultDiv = document.getElementById("order_status");
  document.getElementById("uid").blur(); // 收鍵盤
  
  if(!keyword){
    alert("請輸入關鍵字");
    return;
  }

  const code = getAuthCode();
  if(!code) return;

  setLoading(true);
  resultDiv.innerHTML = '<div class="spinner"></div><div style="text-align:center;color:#666;">查詢中...</div>';

  const get_url = GAS_URL + "?uid=" + encodeURIComponent(keyword) + "&code=" + encodeURIComponent(code);

  fetch(get_url)
  .then(r => r.text())
  .then(text => {
    setLoading(false);

    let obj;
    try { obj = JSON.parse(text); } 
    catch(e) { resultDiv.innerHTML = '<div class="error">資料解析失敗</div>'; return; }

    if(obj.auth === false){
      alert(obj.message || "驗證碼錯誤");
      sessionStorage.removeItem("authCode");
      resultDiv.innerHTML = "";
      return;
    }

    if(obj.ok === false){
      resultDiv.innerHTML = '<div class="error">' + (obj.message || "查詢發生錯誤") + '</div>';
      return;
    }

    if(!Array.isArray(obj) || obj.length <= 1){
      resultDiv.innerHTML = '<div class="no-data">查無符合「' + keyword + '」的資料</div>';
      return;
    }

    // ===== 產生 HTML =====
    const headers = obj[0].data; 
    let html = "";

    // 從 i=1 開始 (避開標題列)
    for(let i = 1; i < obj.length; i++){
      const rowData = obj[i].data;
      
      // 卡牌標題：使用 A 欄資料 (index 0)
      const titleData = rowData[0] || ("資料 #" + i);

      html += `
        <div class="student-card">
          <div class="card-header">${titleData}</div>
          <div class="card-body">
      `;

      // 遍歷所有欄位
      for(let j = 0; j < rowData.length; j++){
        
        // 【重要】如果目前是第0欄 (A欄)，跳過不顯示 (因已在標題)
        if(j === 0) continue;

        let label = headers[j] || ("欄位" + (j+1));
        let value = rowData[j];

        // 格式化生日 (第6欄, index=5)
        if(j === 5) value = formatDate(value);

        html += `
          <div class="data-row">
            <span class="data-label">${label}</span>
            <span class="data-value">${value}</span>
          </div>
        `;
      }
      
      html += `</div></div>`;
    }

    resultDiv.innerHTML = html;

  })
  .catch(err => {
    setLoading(false);
    resultDiv.innerHTML = '<div class="error">系統連線失敗：' + err.message + '</div>';
  });
}

function setLoading(isLoading){
  var btn = document.getElementById("btnQuery");
  var input = document.getElementById("uid");
  btn.disabled = input.disabled = isLoading;
  btn.value = isLoading ? "..." : "查詢";
}

window.addEventListener("DOMContentLoaded", function(){
  document.getElementById("uid").addEventListener("keydown", function(e){
    if(e.key === "Enter") doQuery();
  });
});

</script>
</head>

<body>

<div class="container">
  <h2>學生資料查詢系統</h2>

  <div class="search-card">
    <div class="input-group">
      <input type="text" id="uid" placeholder="請輸入關鍵字 (班級、姓名)">
      <input type="button" id="btnQuery" value="查詢" onclick="doQuery()">
    </div>
  </div>

  <div id="order_status"></div>
</div>

</body>
</html>
