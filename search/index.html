<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<!-- 設定 viewport，關鍵：讓手機版寬度正確縮放 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>學生資料查詢系統</title>

<style>
  /* ============================
     全域設定 (Reset & Base)
     ============================ */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
    background-color: #f0f2f5;
    color: #333;
    margin: 0;
    padding: 0;
    font-size: 16px; /* 防止 iOS 輸入框自動縮放 */
    line-height: 1.5;
  }

  /* 容器：手機版留邊距，電腦版限制最大寬度 */
  .container {
    width: 100%;
    max-width: 600px; /* 手機優先設計，電腦版也不會太寬 */
    margin: 0 auto;
    padding: 20px;
  }

  h2 {
    text-align: center;
    color: #1a73e8;
    margin-bottom: 20px;
    font-size: 1.5rem;
  }

  /* ============================
     搜尋區塊 (Search Box)
     ============================ */
  .search-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 25px;
    position: sticky; /* 讓搜尋框在捲動時稍微黏住上方(視情況) */
    top: 10px;
    z-index: 10;
  }

  .input-group {
    display: flex;
    flex-direction: column; /* 手機預設垂直排列 */
    gap: 12px;
  }

  /* 輸入框優化 */
  input[type="text"] {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s;
    appearance: none; /* 移除 iOS 預設陰影 */
  }

  input[type="text"]:focus {
    border-color: #1a73e8;
  }

  /* 按鈕優化 */
  input[type="button"] {
    width: 100%;
    padding: 12px;
    background-color: #1a73e8;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
  }

  input[type="button"]:active {
    transform: scale(0.98); /* 點擊回饋效果 */
    background-color: #1557b0;
  }
  
  input[type="button"]:disabled {
    background-color: #a0c3ff;
    cursor: wait;
  }

  /* 電腦版/平板版樣式調整 (螢幕大於 480px) */
  @media (min-width: 480px) {
    .input-group {
      flex-direction: row; /* 改為並排 */
    }
    input[type="button"] {
      width: auto;
      min-width: 100px;
    }
  }

  /* ============================
     結果顯示 (Cards)
     ============================ */
  #order_status {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .student-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    overflow: hidden;
    animation: fadeIn 0.3s ease-in-out;
    border: 1px solid #eee;
  }

  .card-header {
    background: #e8f0fe;
    color: #1967d2;
    padding: 12px 20px;
    font-weight: bold;
    font-size: 1.1em;
    border-bottom: 1px solid #dcdcdc;
    display: flex;
    align-items: center;
  }
  
  /* 裝飾性的小圖示或線條 */
  .card-header::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 16px;
    background: #1967d2;
    margin-right: 10px;
    border-radius: 2px;
  }

  .card-body {
    padding: 10px 20px;
  }

  /* 資料列樣式 */
  .data-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f5f5f5;
    flex-wrap: wrap; /* 允許換行 */
  }

  .data-row:last-child {
    border-bottom: none;
  }

  .data-label {
    color: #5f6368;
    font-size: 0.9em;
    min-width: 80px;
    margin-right: 10px;
  }

  .data-value {
    color: #202124;
    font-weight: 500;
    text-align: right;
    flex: 1; /* 佔據剩餘空間 */
    word-break: break-all; /* 防止長字串撐開 */
  }

  /* 極小螢幕調整：如果內容太長，強制換行 */
  @media (max-width: 350px) {
    .data-row { flex-direction: column; }
    .data-value { text-align: left; margin-top: 4px; }
  }

  /* 訊息樣式 */
  .no-data, .error {
    text-align: center;
    padding: 20px;
    background: white;
    border-radius: 8px;
    color: #666;
  }
  .error { color: #d93025; background: #fce8e6; }

  /* Loading Spinner */
  .spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #1a73e8;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
  }

  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

</style>

<script>

// =========================
// GAS 部署網址 (請填入您的 Web App URL)
// =========================
const GAS_URL = "https://script.google.com/macros/s/AKfycby50psP6jBwPYa06oItoeJTnCiSGP6V2qdNAB88Sw5AH-RlI0L5PnnHlephVQpCrxML0Q/exec";

// =========================
// 驗證碼處理
// =========================
function getAuthCode() {
  let code = sessionStorage.getItem("authCode");
  if (!code) {
    code = prompt("請輸入驗證碼：");
    if (!code) return null;
    sessionStorage.setItem("authCode", code);
  }
  return code;
}

// =========================
// 日期格式化 (yyyy-mm-dd)
// =========================
function formatDate(value){
  if (!value) return "";
  value = String(value).trim();
  
  if (!value.includes("T") && !value.includes("-") && !value.includes("/")) {
      return value; 
  }

  if (value.includes("T")) return value.split("T")[0];
  
  const d = new Date(value);
  if(!isNaN(d) && value.length > 6){
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,'0');
    const day=String(d.getDate()).padStart(2,'0');
    return y+"-"+m+"-"+day;
  }
  return value;
}

// =========================
// 查詢主程式
// =========================
function doQuery(){

  const keyword = document.getElementById("uid").value.trim();
  const resultDiv = document.getElementById("order_status");
  
  // 清空並收起鍵盤 (在手機上很實用)
  document.getElementById("uid").blur();
  
  if(!keyword){
    alert("請輸入學生關鍵字");
    return;
  }

  const code = getAuthCode();
  if(!code) return;

  // 顯示 Loading
  setLoading(true);
  resultDiv.innerHTML = '<div class="spinner"></div><div style="text-align:center;color:#666;">查詢中...</div>';

  const get_url = GAS_URL + "?uid=" + encodeURIComponent(keyword) + "&code=" + encodeURIComponent(code);

  fetch(get_url)
  .then(r => r.text())
  .then(text => {
    setLoading(false);

    let obj;
    try { 
      obj = JSON.parse(text); 
    } catch(e) { 
      resultDiv.innerHTML = '<div class="error">資料解析失敗</div>'; 
      return; 
    }

    if(obj.auth === false){
      alert(obj.message || "驗證碼錯誤");
      sessionStorage.removeItem("authCode");
      resultDiv.innerHTML = "";
      return;
    }

    if(obj.ok === false){
      resultDiv.innerHTML = '<div class="error">' + (obj.message || "查詢發生錯誤") + '</div>';
      return;
    }

    if(!Array.isArray(obj) || obj.length <= 1){
      resultDiv.innerHTML = '<div class="no-data">查無符合「' + keyword + '」的資料</div>';
      return;
    }

    // ===== 產生卡牌 HTML =====
    const headers = obj[0].data; 
    let html = "";

    // 從 i=1 開始 (避開標題列)
    for(let i = 1; i < obj.length; i++){
      const rowData = obj[i].data;
      
      // 假設第1欄(index 0)是學號或姓名，用來當卡片標題。若無，則顯示 "學生資料"
      // 這裡直接取 rowData[1] (姓名?) 或 rowData[0]
      let cardTitle = rowData[0] || ("資料 #" + i);
      // 如果想要顯示 "姓名"，需看您試算表的欄位順序，這裡預設顯示第一欄內容
      
      html += `
        <div class="student-card">
          <div class="card-header">${cardTitle}</div>
          <div class="card-body">
      `;

      for(let j = 0; j < rowData.length; j++){
        let label = headers[j] || ("欄位" + (j+1));
        let value = rowData[j];

        // 格式化生日 (假設是第6欄, index=5)
        if(j === 5) value = formatDate(value);

        html += `
          <div class="data-row">
            <span class="data-label">${label}</span>
            <span class="data-value">${value}</span>
          </div>
        `;
      }
      
      html += `</div></div>`; // end card-body, end card
    }

    resultDiv.innerHTML = html;

  })
  .catch(err => {
    setLoading(false);
    resultDiv.innerHTML = '<div class="error">系統連線失敗：' + err.message + '</div>';
  });
}

// =========================
// UI 狀態控制
// =========================
function setLoading(isLoading){
  var btn = document.getElementById("btnQuery");
  var input = document.getElementById("uid");
  btn.disabled = input.disabled = isLoading;
  btn.value = isLoading ? "..." : "查詢";
}

// 綁定事件
window.addEventListener("DOMContentLoaded", function(){
  // 按下 Enter 鍵查詢
  document.getElementById("uid").addEventListener("keydown", function(e){
    if(e.key === "Enter") doQuery();
  });
});

</script>
</head>

<body>

<div class="container">
  <h2>學生資料查詢</h2>

  <div class="search-card">
    <div class="input-group">
      <input type="text" id="uid" placeholder="輸入關鍵字 (姓名、學號)">
      <input type="button" id="btnQuery" value="查詢" onclick="doQuery()">
    </div>
  </div>

  <div id="order_status">
    <!-- 結果區 -->
  </div>
</div>

</body>
</html>
